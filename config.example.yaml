# Rangarr Configuration.
# See https://github.com/JudoChinX/rangarr for documentation.

global:
  interval: 3600

  # Batch sizes: 0 = disabled, -1 = unlimited, N > 0 = limit to N items per cycle
  # missing_batch_size: 20     # Search up to 20 missing items per cycle (default)
  # missing_batch_size: -1     # Search all available missing items (unlimited)
  # missing_batch_size: 0      # Disable missing item searches entirely

  # upgrade_batch_size: 10     # Search up to 10 upgrade items per cycle (default)
  # upgrade_batch_size: -1     # Search all available upgrades (unlimited)
  # upgrade_batch_size: 0      # Disable upgrade searches entirely

  # retry_interval_days: 30           # Skip items searched within this many days (default). 0 = disable.
  # retry_interval_days_missing: 7    # Override retry window for missing searches only (omit to use retry_interval_days)
  # retry_interval_days_upgrade: 60   # Override retry window for upgrade searches only (omit to use retry_interval_days)

  # interleave_instances: false # false = group by instance (default), true = alternate across instances

  # season_packs: false        # Sonarr only: group searches by season (SeasonSearch) instead of per-episode (EpisodeSearch)

  # include_tags: ["active"]     # Only search items that have ANY of these tags (case-insensitive)
  # exclude_tags: ["on-hold"]    # Skip items that have ANY of these tags; exclude wins if both match
  # active_hours: "22:00-06:00"  # Only search within this time window (local time). Leave unset to search at any hour.

instances:
  sonarr-tv:
    type: sonarr
    host: "http://sonarr:8989"     # Use container hostname for Docker deployments
    api_key: "YOUR_SONARR_KEY"
    enabled: false                 # Set to true to activate

  radarr:
    type: radarr
    host: "http://radarr:7878"     # Use container hostname for Docker deployments
    api_key: "YOUR_RADARR_KEY"
    enabled: true

  radarr-4k:
    type: radarr
    host: "http://radarr-4k:7879"  # Use container hostname for Docker deployments
    api_key: "ANOTHER_KEY"
    enabled: false                 # Set to true to activate

  lidarr-music:
    type: lidarr
    host: "http://lidarr:8686"     # Use container hostname for Docker deployments
    api_key: "YOUR_LIDARR_KEY"
    enabled: false                 # Set to true to activate
